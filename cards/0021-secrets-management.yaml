feature: "Secrets management"
as_a: "data analyst connecting to APIs and databases in my pipeline"
i_want: "to reference secrets by name in my manifest without embedding credentials in YAML or relying on shell env alone"
so_that: "credentials are loaded from secure sources at runtime and masked in logs"

scenarios:
  - name: "Secret declaration in manifest"
    given: "a manifest with a secrets section declaring named secrets and their providers"
    when: "arc initialises the pipeline"
    then: "secrets are resolved from the configured provider and injected as environment variables"
    source_lines: "internal/core/dag.go: Secrets — External secret references"

  - name: "Log masking"
    given: "a secret value that appears in step stdout or stderr"
    when: "arc displays or stores step output"
    then: "the secret value is replaced with ******* in all output"
    source_lines: "writing-workflows/secrets.md: Masking — ******* replacement in logs and outputs"

  - name: "File provider"
    given: "a secret with provider: file"
    when: "arc resolves the secret"
    then: "the value is read from the specified file path at runtime"
    source_lines: "writing-workflows/secrets.md: file provider — read complete file contents"

  - name: "Environment provider"
    given: "a secret with provider: env"
    when: "arc resolves the secret"
    then: "the value is read from the process environment — but with masking guarantees that raw env vars don't provide"
    source_lines: "writing-workflows/secrets.md: env provider — resolve from environment scope"

goal: "Named secrets with pluggable providers (env, file) and automatic log masking"
maturity: "planned"
specs: []
references:
  - "/home/hugh/github/dagucloud/dagu/internal/core/dag.go"
  - "/home/hugh/github/dagucloud/docs/writing-workflows/secrets.md"
