feature: "Selective re-materialisation"
as_a: "data analyst iterating on a large pipeline"
i_want: "arc to rebuild only the assets that are stale when I change an upstream step"
so_that: "I don't wait for the entire pipeline to re-run after a small change"

scenarios:
  - name: "Skip fresh assets"
    given: "a pipeline where only one upstream asset has changed"
    when: "I run `arc run`"
    then: "only the changed asset and its downstream dependents are re-materialised"
    source_lines: "decisions/0001: the engine understands data lineage, enabling selective re-materialisation"

  - name: "Staleness detection"
    given: "an asset whose source SQL file has been modified"
    when: "arc evaluates the pipeline"
    then: "the asset is marked stale and scheduled for rebuild"
    source_lines: "spec.yaml: Staleness tracking (DuckDB metadata table or content hashing)"

goal: "v0.3 — partial re-runs"
maturity: "planned"
specs: []
references:
  - "decisions/0001-asset-centric-pipeline-engine.md"
  - "specs/2026-03-30-foundational-decisions/spec.yaml"
