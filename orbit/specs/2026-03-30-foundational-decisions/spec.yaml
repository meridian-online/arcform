goal: >
  Ship ArcForm v0.1 — the step execution foundation of an asset-centric pipeline
  engine. A Rust CLI (`arc`) that parses a YAML manifest, preflights the engine,
  and executes SQL and command steps sequentially against DuckDB. This is the
  execution layer that the asset registry (v0.2) and SQL introspection (v0.2/v0.3)
  build upon.

vision: >
  ArcForm is an asset-centric pipeline engine. Steps are the execution layer (how).
  Assets are the data layer (what). SQL introspection via sqlparser-rs auto-infers
  data dependencies. Selective re-materialisation rebuilds only stale assets. v0.1
  ships the step execution foundation; the asset layer follows.

constraints:
  - "Rust implementation (single crate for v0.1)"
  - "Single static binary — no runtime dependencies beyond the target SQL engine CLI"
  - "DuckDB is the default and only engine in v0.1"
  - "YAML manifest (arcform.yaml) with flat step list — sequential execution by default"
  - "SQL files contain only SQL — no orchestration markup, no templating"
  - "Steps use either `sql:` (engine-aware) or `command:` (raw shell) — exactly one, not both"
  - "Each step is a separate sequential CLI invocation — parallel execution deferred"
  - "arc run locates arcform.yaml in cwd; paths resolve relative to manifest directory"
  - "Asset registry, sqlparser integration, and staleness tracking deferred to v0.2+"

acceptance_criteria:
  - id: ac-1
    ac_type: code
    description: >
      `arc init` creates a project directory with: arcform.yaml (valid manifest
      with name, engine, and db fields), models/ directory, and sources/ directory.
    verification: "Run `arc init my-project && ls my-project/` — expect arcform.yaml, models/, sources/"

  - id: ac-2
    ac_type: code
    description: >
      `arc init` generates a valid arcform.yaml with project name derived from
      the argument, engine defaulting to 'duckdb', db defaulting to '<name>.duckdb',
      and steps as an empty list. Empty project names are rejected.
    verification: >
      Parse the generated arcform.yaml — name matches arg, engine is 'duckdb',
      db is '<name>.duckdb', steps is empty list. `arc init ""` fails.

  - id: ac-3
    ac_type: code
    description: >
      `arc run` parses arcform.yaml, reads the steps list, and executes each
      step's SQL file against the DuckDB CLI in declared order. All steps share
      the same database file (specified by the `db` field). The invocation per
      step is: `duckdb <db_path> -f <sql_file>`.
    verification: >
      Create a 3-step pipeline: step 1 creates a table with a row containing
      value 'a', step 2 inserts 'b', step 3 inserts 'c'. After `arc run`,
      query the database and assert rows exist in order (a, b, c). Also verify
      via CLI output that step names appear in declaration order.

  - id: ac-4
    ac_type: code
    description: >
      `arc run` exits with a non-zero code and clear error message when a SQL
      step fails (e.g., syntax error, missing table reference). Steps after the
      failure do not execute.
    verification: >
      Create a 3-step pipeline where step 2 has invalid SQL. `arc run` exits
      non-zero with the DuckDB error visible. Verify step 3 did not execute
      (its table does not exist in the database).

  - id: ac-5
    ac_type: code
    description: >
      `arc run` exits with a clear error when: (a) arcform.yaml is missing
      (run from a directory without one), (b) arcform.yaml is malformed YAML,
      or (c) a step references a SQL file that doesn't exist. Each case produces
      a specific, distinct error message.
    verification: >
      Test all three cases. For (a), run `arc run` from /tmp — expect
      "arcform.yaml not found in current directory". For (b) and (c), create
      test manifests and verify specific error messages.

  - id: ac-6
    ac_type: code
    description: >
      `arc run` verifies that the declared engine CLI (duckdb) is available
      and executable before running any steps, by invoking `duckdb --version`
      and checking for a successful exit code.
    verification: >
      Set PATH to exclude duckdb. `arc run` fails with a clear error message
      before any SQL runs. Verify no database file is created.

  - id: ac-7
    ac_type: code
    description: >
      SQL files are passed to the DuckDB CLI unmodified — arc does not template,
      transform, or inject anything into the SQL content.
    verification: >
      Unit test using a mock engine (Engine trait with a MockEngine impl that
      records the SQL content it receives). Assert the recorded content is
      byte-identical to the source SQL file.

  - id: ac-8
    ac_type: code
    description: >
      `arc run` on a project with an empty steps list (`steps: []`) exits
      successfully (code 0) with a message indicating no steps were defined.
    verification: >
      Run `arc run` on a freshly initialised project. Exits 0. Output contains
      "no steps" or equivalent message.

  - id: ac-9
    ac_type: code
    description: >
      A step with `command:` instead of `sql:` executes the raw command string
      via shell (`sh -c "<command>"`). The command's exit code determines
      step success/failure. Engine preflight check is skipped for command steps
      if no sql steps exist in the manifest.
    verification: >
      Create a manifest with a command step (`command: echo hello`). `arc run`
      executes it and prints stdout. Create a failing command step
      (`command: exit 1`). `arc run` exits non-zero.

  - id: ac-10
    ac_type: code
    description: >
      A step with both `sql:` and `command:` (or neither) is rejected during
      manifest validation with a clear error message before any steps execute.
    verification: >
      Create manifests with: (a) a step having both fields, (b) a step having
      neither. Both produce a specific validation error naming the offending step.

ontology_schema:
  name: "ArcFormProject"
  description: "The manifest model for an ArcForm pipeline project (v0.1 — steps only)"
  fields:
    - name: "name"
      type: "string"
      description: "Project name, derived from directory name on init"
    - name: "engine"
      type: "string"
      description: "Target SQL engine CLI identifier (default: 'duckdb')"
    - name: "db"
      type: "string"
      description: "Path to the database file, relative to manifest directory (default: '<name>.duckdb')"
    - name: "steps"
      type: "array"
      description: "Ordered list of transform steps to execute sequentially"
    - name: "steps[].name"
      type: "string"
      description: "Unique identifier for this step (must be non-empty)"
    - name: "steps[].sql"
      type: "string"
      description: "Relative path to SQL file (resolved from manifest dir). Mutually exclusive with command."
    - name: "steps[].command"
      type: "string"
      description: "Raw shell command string. Executed via `sh -c`. Mutually exclusive with sql."
  future_fields:
    - name: "assets"
      type: "object"
      description: "v0.2: Asset registry mapping data outputs to steps with dependency declarations"
    - name: "assets.<name>.produced_by"
      type: "string"
      description: "v0.2: Step name that produces this asset"
    - name: "assets.<name>.depends_on"
      type: "array"
      description: "v0.2: Asset names this asset depends on (overrides sqlparser inference)"
    - name: "assets.<name>.type"
      type: "string"
      description: "v0.2: Asset type (table, file, model, etc.)"

evaluation_principles:
  - principle: "Correctness — steps execute in declared order, failures halt the pipeline"
    weight: 0.35
  - principle: "Transparency — every step's status (running/success/failure) is visible in CLI output"
    weight: 0.25
  - principle: "Simplicity — minimal manifest schema, no unnecessary config for the common case"
    weight: 0.20
  - principle: "Portability — single binary, no runtime dependencies beyond engine CLI"
    weight: 0.20

exit_conditions:
  - "All 10 acceptance criteria pass"
  - "Binary compiles on Linux and macOS (x86_64 + aarch64)"
  - "`cargo test` passes with unit tests for manifest parsing, step execution, engine mock, and error cases"
  - "A sample 3-step pipeline (create table → insert → aggregate) runs end-to-end against a real DuckDB instance"

implementation_notes:
  crate_structure: >
    Single crate for v0.1. Modules: cli (clap commands), manifest (YAML parsing + validation),
    engine (trait for CLI execution, DuckDB impl, MockEngine for tests), runner (pipeline
    execution), error (custom error types).
  step_execution: >
    Two execution paths based on step type:
    1. `sql:` steps — `duckdb <db_path> -f <sql_file>` via std::process::Command
    2. `command:` steps — `sh -c "<command>"` via std::process::Command
    Both paths capture exit code, stdout, and stderr. Both halt the pipeline on failure.
  engine_trait: >
    Engine trait with execute_sql, execute_command, and preflight methods.
    DuckDbEngine for production. MockEngine records calls for unit tests with
    per-call failure tracking.
  invocation_model: >
    DuckDB CLI invocation per step: `duckdb <db_path> -f <sql_file>`. Opens/creates
    the database file, executes the SQL, exits. All steps share the same database file
    (from manifest `db` field). File persists after `arc run` completes.
  working_directory: >
    `arc run` looks for arcform.yaml in cwd. All relative paths resolve relative to
    the manifest directory.
  key_crates:
    - "clap ~4 — CLI argument parsing with derive macros"
    - "serde + serde_yaml — manifest deserialization"
    - "thiserror — ergonomic error types"
    - "owo-colors — terminal output formatting"

roadmap:
  v0.2:
    - "Asset registry in manifest (assets section mapping outputs to steps)"
    - "sqlparser-rs integration for SQL introspection (table reads/writes)"
    - "Auto-inferred dependencies from SQL with explicit override"
  v0.3:
    - "Staleness tracking (DuckDB metadata table or content hashing)"
    - "Selective re-materialisation (rebuild only stale assets)"
    - "depends_on for step ordering / parallel execution"
  future:
    - "Typed step promotion (observe command patterns, promote to first-class types)"
    - "Preflight version assertions for engine compatibility"
    - "CTE-level dependency tracking"
    - "Remote scheduling story"

