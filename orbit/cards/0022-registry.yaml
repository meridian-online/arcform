feature: "Registry"
as_a: "an analyst or operator who wants working ArcForm pipelines that produce real value"
i_want: "to discover, fetch, and run curated pipelines from a hosted catalogue without building them from scratch"
so_that: "I get immediate analytical value from ArcForm, learn realistic patterns by example, and can demonstrate the local-then-schedule narrative on my own machine"

scenarios:
  - name: "Browse the registry"
    given: "I have arc installed and a network connection"
    when: "I run `arc registry list`"
    then: "I see the canonical entries grouped or tagged by pillar (Practical, Foundational, Investigative), each with a one-line summary"
    source_lines: "interview 2026-04-29-arcform-registry: Q3 (CLI surface — list)"

  - name: "Inspect an entry before fetching"
    given: "I see brewtrend in the registry list"
    when: "I run `arc registry show brewtrend`"
    then: "I see metadata, summary, sources, schedule guidance, and the entry's README — without any pipeline files being downloaded"
    source_lines: "interview 2026-04-29-arcform-registry: Q3 (CLI surface — show)"

  - name: "Fetch an entry to local cache"
    given: "I want to inspect brewtrend's manifest and SQL files"
    when: "I run `arc registry fetch brewtrend`"
    then: "the entry is downloaded to `~/.arcform/registry/brewtrend/<ref>/` and I can browse its YAML + SQL files locally"
    source_lines: "interview 2026-04-29-arcform-registry: Q3 (CLI surface — fetch), Q6b (monorepo + git fetch)"

  - name: "Run a registry entry end-to-end"
    given: "I want to use brewtrend immediately for actual analysis"
    when: "I run `arc registry run brewtrend`"
    then: "arc fetches the entry (if not cached) and executes the pipeline, producing real outputs — fresh trending package data ready to query"
    source_lines: "interview 2026-04-29-arcform-registry: Q1 (end-users-first), Q3 (CLI surface — run)"

  - name: "Two pillars populated in v1; Investigative reserved"
    given: "the registry is freshly published"
    when: "I list canonical entries"
    then: "I see two populated entries — `brewtrend` under Practical, `gnaf` under Foundational — and the Investigative pillar visible-but-empty, reserved for `fred` once card 0021 (secrets management) ships"
    source_lines: "interview 2026-04-29-arcform-registry: Q5 (MVP scope; refined during design); design 2026-04-29-arcform-registry: Q4 (fred deferred); decision 0015 (three pillars)"

  - name: "Canonical and contributor entries coexist"
    given: "the index format supports two ownership tiers from v1"
    when: "I run `arc registry run brewtrend` versus `arc registry run someone/myproject`"
    then: "canonical names resolve unprefixed; contributor entries resolve under their owner namespace; canonical names cannot be shadowed by contributors"
    source_lines: "interview 2026-04-29-arcform-registry: Q9 (Docker Hub two-tier model); decision 0016 (two-tier ownership)"

  - name: "Git is preferred but not required"
    given: "I am on a machine without git installed"
    when: "I run `arc registry fetch brewtrend`"
    then: "arc detects git is missing and falls back to the GitHub archive tarball endpoint, extracting the entry into the local cache successfully"
    source_lines: "interview 2026-04-29-arcform-registry: Q6b (monorepo + git fetch with tarball fallback); decision 0014"

  - name: "Smoke-tested in CI without live data"
    given: "the meridian-online/registry repo runs CI on a pull request"
    when: "CI runs the registry smoke-test"
    then: "every entry is parsed, SQL is introspected, dependency graphs validate, source URLs are well-formed — without any network fetches against real data sources"
    source_lines: "interview 2026-04-29-arcform-registry: Q7 (smoke-test only fixture role)"

  - name: "Local-then-schedule demonstrated per entry"
    given: "I fetch any registry entry"
    when: "I read its README"
    then: "I see both modes documented: how to run locally with `arc registry run`, and a scheduling example showing the same manifest running remotely on a cron"
    source_lines: "interview 2026-04-29-arcform-registry: implementation notes (local-then-schedule narrative); decision 0006 (local-first, remote-compatible)"

goal: "Ship an end-users-first registry of working ArcForm pipelines, organised across three pillars, distributed via hosted monorepo + on-demand fetch. v1 ships brewtrend (Practical) + gnaf (Foundational); fred (Investigative) deferred to a follow-up spec gated on card 0021 (secrets management). Architecture supports two-tier ownership (canonical + contributor) from day one."
maturity: "in_design"
specs:
  - "2026-04-29-arcform-registry/interview.md"
  - "2026-04-29-arcform-registry/design.md"
  - "orbit/specs/2026-04-29-arcform-registry/spec.yaml"
